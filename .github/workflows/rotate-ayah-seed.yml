name: Rotate Ayah of the Day Seed

on:
  schedule:
    # 00:00 UTC on the 1st of every month
    - cron: '0 0 1 * *'
  workflow_dispatch:
    inputs:
      regenerate:
        description: "Force-regenerate the current month's seed even if one already exists"
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: rotate-ayah-seed
  cancel-in-progress: false

jobs:
  rotate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.repository == 'mazipan/baca-quran.id'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rotate seed
        id: rotate
        env:
          REGENERATE: ${{ inputs.regenerate || 'false' }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = 'src/data/ayah-of-the-day-seeds.json';
          const raw = fs.readFileSync(path, 'utf8');
          const data = JSON.parse(raw);

          const now = new Date();
          const mm = String(now.getUTCMonth() + 1).padStart(2, '0');
          const year = now.getUTCFullYear();
          const regenerate = process.env.REGENERATE === 'true';

          const hadSeed = Object.prototype.hasOwnProperty.call(data.seeds, mm);
          let action;
          if (hadSeed && !regenerate) {
            action = 'skipped';
          } else {
            // Random 32-bit positive integer.
            const seed = Math.floor(Math.random() * 0x7fffffff);
            data.seeds[mm] = seed;
            action = hadSeed ? 'regenerated' : 'added';
          }

          data.lastRotation = {
            month: mm,
            year,
            action,
            generatedAt: now.toISOString()
          };

          fs.writeFileSync(path, JSON.stringify(data, null, '\t') + '\n');

          // Expose to subsequent steps.
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `action=${action}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `month=${mm}\n`);
          fs.appendFileSync(process.env.GITHUB_OUTPUT, `year=${year}\n`);
          EOF

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YEAR: ${{ steps.rotate.outputs.year }}
          MONTH: ${{ steps.rotate.outputs.month }}
          ACTION: ${{ steps.rotate.outputs.action }}
          BASE_BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/ayah-seed-${YEAR}-${MONTH}"
          git checkout -b "$BRANCH"
          git add src/data/ayah-of-the-day-seeds.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore(ayah-of-the-day): seed for ${YEAR}-${MONTH} (${ACTION})"
          git push origin "$BRANCH"

          PR_PAYLOAD=$(jq -n \
            --arg title "chore(ayah-of-the-day): seed for ${YEAR}-${MONTH} (${ACTION})" \
            --arg body "Automated monthly seed rotation for ${YEAR}-${MONTH}." \
            --arg head "$BRANCH" \
            --arg base "$BASE_BRANCH" \
            '{title: $title, body: $body, head: $head, base: $base}')

          PR_NUMBER=$(curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d "$PR_PAYLOAD" \
            | jq -r '.number')

          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/labels" \
            -d '{"labels":["automerge"]}'
