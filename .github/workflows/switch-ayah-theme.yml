name: Switch Ayah of the Day Theme

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme to force ('auto' clears the override and restores date-based resolution)"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - ramadhan

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: switch-ayah-theme
  cancel-in-progress: false

jobs:
  switch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.repository == 'mazipan/baca-quran.id'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update theme override
        env:
          THEME_INPUT: ${{ inputs.theme }}
          ACTOR: ${{ github.actor }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = 'src/data/ayah-of-the-day-config.json';
          const raw = fs.readFileSync(path, 'utf8');
          const data = JSON.parse(raw);

          const input = process.env.THEME_INPUT;
          const value = input === 'auto' ? null : input;

          data.forcedThemeId = value;
          data.lastSwitch = {
            value,
            switchedAt: new Date().toISOString(),
            actor: process.env.ACTOR || null
          };

          fs.writeFileSync(path, JSON.stringify(data, null, '\t') + '\n');
          EOF

      - name: Open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          THEME_INPUT: ${{ inputs.theme }}
          ACTOR: ${{ github.actor }}
          BASE_BRANCH: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/ayah-theme-${THEME_INPUT}-${RUN_ID}"
          git checkout -b "$BRANCH"
          git add src/data/ayah-of-the-day-config.json
          if git diff --cached --quiet; then
            echo "No changes to commit (already on requested theme)."
            exit 0
          fi
          git commit -m "chore(ayah-of-the-day): switch theme to ${THEME_INPUT} by ${ACTOR}"
          git push origin "$BRANCH"

          PR_PAYLOAD=$(jq -n \
            --arg title "chore(ayah-of-the-day): switch theme to ${THEME_INPUT}" \
            --arg body "Automated theme switch to \`${THEME_INPUT}\` triggered by @${ACTOR}." \
            --arg head "$BRANCH" \
            --arg base "$BASE_BRANCH" \
            '{title: $title, body: $body, head: $head, base: $base}')

          PR_NUMBER=$(curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/pulls" \
            -d "$PR_PAYLOAD" \
            | jq -r '.number')

          curl -s -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${REPO}/issues/${PR_NUMBER}/labels" \
            -d '{"labels":["automerge"]}'
