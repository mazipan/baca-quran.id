name: Switch Ayah of the Day Theme

on:
  workflow_dispatch:
    inputs:
      theme:
        description: "Theme to force ('auto' clears the override and restores date-based resolution)"
        required: true
        type: choice
        default: auto
        options:
          - auto
          - ramadhan

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: switch-ayah-theme
  cancel-in-progress: false

jobs:
  switch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.repository == 'mazipan/baca-quran.id'

    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update theme override
        env:
          THEME_INPUT: ${{ inputs.theme }}
          ACTOR: ${{ github.actor }}
        run: |
          node <<'EOF'
          const fs = require('node:fs');
          const path = 'src/data/ayah-of-the-day-config.json';
          const raw = fs.readFileSync(path, 'utf8');
          const data = JSON.parse(raw);

          const input = process.env.THEME_INPUT;
          const value = input === 'auto' ? null : input;

          data.forcedThemeId = value;
          data.lastSwitch = {
            value,
            switchedAt: new Date().toISOString(),
            actor: process.env.ACTOR || null
          };

          fs.writeFileSync(path, JSON.stringify(data, null, '\t') + '\n');
          EOF

      - name: Commit and push
        id: push
        env:
          THEME_INPUT: ${{ inputs.theme }}
          ACTOR: ${{ github.actor }}
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/ayah-theme-${THEME_INPUT}-${RUN_ID}"
          git checkout -b "$BRANCH"
          git add src/data/ayah-of-the-day-config.json
          if git diff --cached --quiet; then
            echo "No changes to commit (already on requested theme)."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(ayah-of-the-day): switch theme to ${THEME_INPUT} by ${ACTOR}"
          git push origin "$BRANCH"
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Open PR
        if: steps.push.outputs.changed == 'true'
        uses: actions/github-script@v9
        env:
          BRANCH: ${{ steps.push.outputs.branch }}
          THEME_INPUT: ${{ inputs.theme }}
          ACTOR: ${{ github.actor }}
        with:
          script: |
            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `chore(ayah-of-the-day): switch theme to ${process.env.THEME_INPUT}`,
              body: `Automated theme switch to \`${process.env.THEME_INPUT}\` triggered by @${process.env.ACTOR}.`,
              head: process.env.BRANCH,
              base: context.ref.replace('refs/heads/', ''),
            });
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: ['automerge'],
            });
